<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bài tập 1: Biến & Kiểu dữ liệu</title>
    <!--
    ╔════════════════════════════════════════════════════════════════╗
    ║  BÀI TẬP 1: BIẾN, KIỂU DỮ LIỆU, MATH & FORMAT STRING            ║
    ╚════════════════════════════════════════════════════════════════╝

    Bối cảnh: app luyện thi YouPass. Mở Console (F12) để xem kết quả.
    Viết code JavaScript trong thẻ <script> theo các TODO bên dưới.

    📌 Nhiệm vụ:

    1. Khai báo biến lưu thông tin học viên:
       - tenHocVien = "Minh"          (dùng const hay let? — giá trị này không đổi)
       - const TONG_CAU = 40          (hằng số — tổng số câu)
       - let soCauDung = 33           (sẽ thay đổi → dùng let)

    2. In ra GIÁ TRỊ và KIỂU của 3 biến trên bằng console.log + typeof.

    3. Tính phanTram = số câu đúng / tổng câu * 100. In ra.

    4. Dùng Math để:
       - Làm tròn phanTram về số nguyên gần nhất (Math.round) → in ra.
       - Cho 3 band [6.5, 7, 5.5], tìm band CAO nhất bằng Math.max → in ra.

    5. Dùng FORMAT STRING (template literal `...${}...`) in một dòng:
       "Học viên Minh đúng 33/40 câu (82.5%)."

    💡 GỢI Ý:
    - string phải có dấu nháy: "Minh". number thì không.
    - typeof trả về chuỗi: console.log(typeof soCauDung);
    - Template literal dùng dấu backtick ` ` chứ không phải nháy đơn.
    -->
  </head>
  <body>
    <h1>Bài tập 1 — Mở Console (F12) để xem kết quả</h1>

    <script>
      // ===== VIẾT CODE Ở ĐÂY =====

      // TODO 1: Khai báo biến (tenHocVien, TONG_CAU, soCauDung)
        let tenHocVien = "Lĩnh";
        const TONG_CAU = 40;
        let soCauDung = 33;

      // TODO 2: In giá trị + kiểu (typeof) của 3 biến
        console.log(typeof tenHocVien)
        console.log(typeof TONG_CAU)
        console.log(typeof soCauDung)
      // TODO 3: Tính & in phần trăm
        const phanTram = soCauDung / TONG_CAU * 100
        console.log(typeof phanTram)

      // TODO 4: Math.round phần trăm + Math.max tìm band cao nhất
        console.log(Math.round(phanTram))
        console.log(Math.max(6,7,7.5))
      // TODO 5: Format string một dòng tổng kết
        console.log(`Học viên Lĩnh đúng ${soCauDung}/${TONG_CAU} câu ${phanTram}.`)
    </script>
  </body>
</html>
