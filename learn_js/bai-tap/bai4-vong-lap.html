    <!--
    ╔════════════════════════════════════════════════════════════════╗
    ║  BÀI TẬP 4: FOR / WHILE — AVERAGE, HIGH SCORE, EVEN, FIZZBUZZ  ║
    ╚════════════════════════════════════════════════════════════════╝

    Bối cảnh: thống kê điểm lớp luyện thi YouPass. Mở Console (F12).

    📌 Nhiệm vụ — dùng VÒNG LẶP (không dùng hàm có sẵn như reduce):

    Cho sẵn:  const bandLop = [6.5, 7, 5.5, 8, 6, 7.5];

    1. AVERAGE SCORE: dùng for + biến tích luỹ (tong = 0) tính band
       TRUNG BÌNH của cả lớp. In ra.  (gợi ý: bandLop.length)

    2. HIGH SCORE: dùng for tìm band CAO NHẤT (KHÔNG dùng Math.max).
       (gợi ý: giả định caoNhat = 0, gặp đứa lớn hơn thì cập nhật)

    3. ADDING EVEN NUMBERS: dùng for tính TỔNG các số CHẴN từ 1 đến 50.
       (gợi ý: i % 2 === 0 là số chẵn)

    4. WHILE 
    — LỘ TRÌNH: học viên đang band 4.5:
      + Nếu band hiện tại dưới 5.5 thì sau mỗi buổi tăng 0.5
      + Nếu band hiện tại từ 5.5 trở lên thì sau mỗi buổi chỉ tăng 0.25 ( vì càng lên càng khó )
    => Sử dụng vòng lặp white và if...else để *đếm số buổi học* cần để đạt được ít nhất 7 điểm.

    5. FIZZBUZZ: in từ 1 đến 30:
         - chia hết cho 3 VÀ 5 → "FizzBuzz"
         - chia hết cho 3        → "Fizz"
         - chia hết cho 5        → "Buzz"
         - còn lại               → chính số đó
       ⚠️ Nhớ xét điều kiện "cả 3 và 5" ĐẦU TIÊN!

    💡 GỢI Ý:
    - for (let i = 0; i < n; i++) khi biết trước số vòng.
    - while (điều_kiện) khi lặp tới khi đạt một mốc.
    - Tránh vòng lặp vô tận: đảm bảo điều kiện tiến dần tới false.
    -->
