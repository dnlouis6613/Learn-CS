<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bài tập 3: Function</title>
    <!--
    ╔════════════════════════════════════════════════════════════════╗
    ║  BÀI TẬP 3: FUNCTION — PARAMETER, RETURN, PHÂN RÃ              ║
    ╚════════════════════════════════════════════════════════════════╝

    Bối cảnh: xây "máy tính band" cho app YouPass. Mở Console (F12).

    📌 Nhiệm vụ — viết 4 hàm nhỏ, mỗi hàm LÀM ĐÚNG MỘT VIỆC và RETURN:

    1. tinhPhanTram(dung, tong)
       → trả về (dung / tong) * 100.
       Test: console.log(tinhPhanTram(35, 40)); // 87.5

    2. tinhTrungBinh(l, r, w, s)
       → trả về band trung bình 4 kỹ năng = (l + r + w + s) / 4.
       Test: tinhTrungBinh(6.5, 7, 6, 7); // 6.625

    3. lamTronIelts(diem)
       → làm tròn về .0 hoặc .5: Math.round(diem * 2) / 2.
       Test: lamTronIelts(6.625); // 6.5

    4. xepLoaiBand(band)  — dùng return SỚM:
         band >= 8.0 → "Expert"
         band >= 6.5 → "Competent"
         band >= 5.0 → "Modest"
         còn lại      → "Beginner"

    5. GHÉP CHUỖI: từ 4 kỹ năng (6.5, 7, 6, 7), dùng 3 hàm 2-3-4 để
       in ra: "Band 6.5 — Trình độ Competent".

    💡 GỢI Ý:
    - Hàm TÍNH TOÁN nên dùng return (KHÔNG console.log bên trong).
    - return kết thúc hàm ngay → tận dụng để bỏ else.
    - Có thể viết arrow function: const ten = (a, b) => a + b;
    -->
  </head>
  <body>
    <h1>Bài tập 3 — Mở Console (F12) để xem kết quả</h1>

    <script>
      // ===== VIẾT CODE Ở ĐÂY =====
      // TODO 1: tinhPhanTram(dung, tong)
        function tinhPhanTram(dung, tong) {
          console.log((dung/ tong) * 100);
        }
        tinhPhanTram(35,40)
      // TODO 2: tinhTrungBinh(l, r, w, s)
        function tinhTrungBinh(l,w,r,s) {
          console.log((l+w+r+s)/4);
        }
        tinhTrungBinh(6.5, 7, 6, 7)

      // TODO 3: lamTronIelts(diem)
        function lamTronIelts(diem) {
          console.log(Math.round(diem * 2)/2)
        }
        lamTronIelts(6.625)
      // TODO 4: xepLoaiBand(band) — dùng return sớm
        function xepLoaiBand(band) {
          if(band >= 8.0) return "Expert";
          else if(band >= 6.5)  return "Competent";
          else if(band >= 5.0) return "Modest";
          else console.log("Beginner")
        }
        console.log(xepLoaiBand(6.5))

      // TODO 5: Ghép chuỗi 3 hàm để in kết quả cuối

    </script>
  </body>
</html>
