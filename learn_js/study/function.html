      const tinhTuoiHienNay = (namSinh) => {
        let tuoiHienTai = 2026 - namSinh;
        console.log(`Tuổi của bạn hiện tại là: ${tuoiHienTai} tuổi`);
        return tuoiHienTai;
      };

      const tinhTuoi5NamSau = (namSinh) => {
        let age = tinhTuoiHienNay(namSinh);
        console.log(`Tuổi của bạn sau 5 năm là: ${age + 5} tuổi`);
      };

      // - Nhập năm sinh và tính tuổi 5 năm sau.
      tinhTuoi5NamSau(2001);
      tinhTuoi5NamSau(2013);
      tinhTuoi5NamSau(2008);
