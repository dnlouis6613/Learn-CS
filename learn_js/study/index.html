<!DOCTYPE html>

<head>

</head>
<body>
  <h1>Learn Javascript</h1>
  <script>
    let kyNang = "Listening";
    switch (kyNang) {
      case "Listening":
        console.log("Thời lượng: 30 phút");
        break;
      case "Reading":
        console.log("Thời lượng: 60 phút");
        break;
      case "Writing":
        console.log("Thời lượng: 60 phút");
        break;
      case "Speaking":
        console.log("Thời lượng: 11–14 phút");
        break;
      default:
        console.log("Kỹ năng không hợp lệ");
    }
  </script>
</body>
